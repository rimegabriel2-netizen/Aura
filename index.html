<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F7; color: #1d1d1f; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // 1. INJECTION DE TES DONNÉES SAUVEGARDÉES
        const mySavedData = {
          "templateStartDate": "2026-04-27",
          "templateEndDate": "2026-08-01",
          "weekTemplate": {
            "1": [
              { "tplId": "mon-1", "startMin": 420, "endMin": 450, "title": "Déjeuner", "category": "perso" },
              { "tplId": "mon-2", "startMin": 480, "endMin": 540, "title": "Chimie", "category": "learn" },
              { "tplId": "mon-3", "startMin": 480, "endMin": 600, "title": "Meal", "category": "perso" },
              { "tplId": "mon-4", "startMin": 545, "endMin": 600, "title": "Révision chimie", "category": "learn" },
              { "tplId": "mon-5", "startMin": 600, "endMin": 630, "title": "Collation", "category": "perso" },
              { "tplId": "mon-6", "startMin": 640, "endMin": 720, "title": "Révision biologie", "category": "learn" },
              { "tplId": "mon-7", "startMin": 720, "endMin": 780, "title": "Diner", "category": "perso" },
              { "tplId": "mon-8", "startMin": 785, "endMin": 840, "title": "Révision biologie", "category": "learn" },
              { "tplId": "mon-9", "startMin": 840, "endMin": 960, "title": "Travail de maturité", "category": "learn" },
              { "tplId": "mon-10", "startMin": 960, "endMin": 990, "title": "Collation", "category": "perso" },
              { "tplId": "mon-11", "startMin": 1000, "endMin": 1080, "title": "Travail de maturité", "category": "learn" },
              { "tplId": "mon-12", "startMin": 1110, "endMin": 1200, "title": "Séance cardio", "category": "sport" },
              { "tplId": "mon-13", "startMin": 1350, "endMin": 1440, "title": "Sleep", "category": "perso" }
            ]
          },
          "statuses": {
            "2026-04-27": {
              "2026-04-27__mon-1": "done",
              "2026-04-27__mon-2": "done"
            }
          },
          "overrides": {},
          "extraBlocks": {},
          "objectives": [
            { "id": "o1", "icon": "🏃", "label": "Sport", "category": "sport", "defaultDuration": 60 },
            { "id": "o2", "icon": "📖", "label": "Lecture", "category": "learn", "defaultDuration": 60 },
            { "id": "o4", "icon": "🎯", "label": "Deep work", "category": "work", "defaultDuration": 120 },
            { "id": "o5", "icon": "🧠", "label": "Étudier", "category": "learn", "defaultDuration": 120 },
            { "id": "o6", "icon": "🍽️", "label": "Repas", "category": "perso", "defaultDuration": 60 },
            { "id": "o7", "icon": "🧘", "label": "Méditer", "category": "perso", "defaultDuration": 30 },
            { "id": "o8", "icon": "✉️", "label": "Emails", "category": "work", "defaultDuration": 60 }
          ],
          "habits": [
            { "id": "h1", "name": "Sport", "icon": "🏃", "history": {} },
            { "id": "h2", "name": "Lecture", "icon": "📖", "history": {} }
          ],
          "tasks": {
            "do": [ { "id": "5ns37a7q", "text": "Rendre mon tm", "done": false } ],
            "plan": [],
            "delegate": [ { "id": "fj8crtqf", "text": "faire vaisselle", "done": false } ],
            "drop": []
          },
          "transactions": [],
          "goals": [],
          "themeMode": "auto"
        };

        // 2. RÉCUPÉRATION OU CRÉATION DE LA MÉMOIRE LOCALE
        const STORAGE_KEY = 'aura_app_data';
        if (!localStorage.getItem(STORAGE_KEY)) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(mySavedData));
        }

        // 3. AFFICHAGE DE L'INTERFACE
        function renderApp() {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
            const root = document.getElementById('root');
            
            root.innerHTML = `
                <div class="min-h-screen p-6 md:p-12">
                    <header class="mb-12 flex justify-between items-end">
                        <div>
                            <p class="text-xs font-semibold opacity-50 uppercase tracking-widest mb-1">Espace Personnel</p>
                            <h1 class="text-5xl font-bold tracking-tight">Aura<span class="text-blue-500">.</span></h1>
                        </div>
                        <div class="glass px-4 py-2 rounded-full text-sm font-medium">
                            Status : Connecté
                        </div>
                    </header>

                    <main class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <section class="md:col-span-2 glass rounded-[2rem] p-8">
                            <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                                <i data-lucide="target" class="w-5 h-5"></i> Mes Objectifs Actifs
                            </h2>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                                ${data.objectives.map(obj => `
                                    <div class="flex items-center gap-3 p-4 bg-white/50 rounded-2xl border border-white/20 shadow-sm cursor-pointer hover:scale-105 transition-transform">
                                        <div class="text-3xl">${obj.icon}</div>
                                        <div>
                                            <div class="font-semibold text-sm">${obj.label}</div>
                                            <div class="text-[10px] opacity-50 uppercase">${obj.category}</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <h2 class="text-xl font-semibold mt-10 mb-6 flex items-center gap-2">
                                <i data-lucide="list-todo" class="w-5 h-5"></i> Matrice des Tâches
                            </h2>
                            <div class="space-y-3">
                                ${data.tasks.do.map(task => `
                                    <div class="flex items-center justify-between p-4 bg-white/50 rounded-xl border-l-4 border-red-500">
                                        <span class="font-medium">${task.text}</span>
                                        <div class="w-6 h-6 rounded-full border-2 border-gray-300"></div>
                                    </div>
                                `).join('')}
                                ${data.tasks.delegate.map(task => `
                                    <div class="flex items-center justify-between p-4 bg-white/50 rounded-xl border-l-4 border-yellow-500">
                                        <span class="font-medium">${task.text}</span>
                                        <div class="w-6 h-6 rounded-full border-2 border-gray-300"></div>
                                    </div>
                                `).join('')}
                            </div>
                        </section>

                        <section class="space-y-8">
                            <div class="glass rounded-[2rem] p-8 bg-gradient-to-br from-white/50 to-transparent">
                                <h2 class="text-sm font-semibold opacity-50 mb-4 uppercase">Wallet (Local)</h2>
                                <p class="text-4xl font-bold">0 CHF</p>
                                <div class="mt-6 flex gap-2">
                                    <button class="flex-1 bg-black text-white py-2 rounded-xl text-sm font-medium">Entrée</button>
                                    <button class="flex-1 border border-black/10 py-2 rounded-xl text-sm font-medium">Sortie</button>
                                </div>
                            </div>

                            <div class="glass rounded-[2rem] p-8">
                                <h2 class="text-sm font-semibold opacity-50 mb-4 uppercase flex items-center gap-2">
                                    <i data-lucide="flame" class="w-4 h-4"></i> Habit Streaks
                                </h2>
                                <div class="space-y-4">
                                    ${data.habits.map(habit => `
                                        <div class="flex items-center gap-4">
                                            <div class="text-2xl">${habit.icon}</div>
                                            <div class="flex-1">
                                                <div class="flex justify-between mb-1">
                                                    <span class="text-sm font-medium">${habit.name}</span>
                                                    <span class="text-xs opacity-50">100%</span>
                                                </div>
                                                <div class="h-2 w-full bg-gray-200 rounded-full overflow-hidden">
                                                    <div class="h-full bg-blue-500 w-full rounded-full"></div>
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </section>
                    </main>
                </div>
            `;
            lucide.createIcons(); // Active les icônes
        }

        renderApp();
    </script>
</body>
</html>
